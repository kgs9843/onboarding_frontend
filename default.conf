upstream backend_service_connect {
    server backend:3002;
    # 🛠️ [조치 1] 서비스 커넥트 펜딩 버그 방지를 위해 keepalive를 제거합니다.
}

server {
    listen 80;
    listen [::]:80;
    server_name olive0.store www.olive0.store;

    # 📝 [로그 추가] 모든 접속 및 에러 로그를 표준 출력으로 내보내어 CloudWatch에 찍히게 합니다.
    access_log /dev/stdout;
    error_log /dev/stderr info; # info 단계로 상세히 기록

    root /usr/share/nginx/html;
    index index.html;

    # 1. API 요청 ➔ 서비스 커넥트 고속도로 타고 백엔드로 직통 패스
    location /api/ {
        # 📝 [로그 추가] 백엔드로 요청을 보낼 때 Nginx 로그에 기록을 강제로 남깁니다.
        access_log /dev/stdout;

        proxy_pass http://backend_service_connect;
        
        # 🛠️ [조치 2] HTTP 버전을 기본값(1.0)으로 내려서 연결을 매 요청마다 깔끔하게 끊고 맺게 합니다.
        # proxy_http_version 1.1; (주석 처리 또는 삭제)
        
        # 🛠️ [조치 3] 서비스 커넥트 에이전트(Envoy)가 헤더를 오해하지 않도록 Host만 명시합니다.
        proxy_set_header Host backend:3002;
        proxy_set_header Connection "";
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 2. 일반 접속 ➔ 내 React 앱 화면 띄워주기
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. Nginx 생존 신고 통로 (ALB 헬스체크용)
    location = /health {
        # 헬스체크는 불필요한 로그가 너무 많이 쌓이므로 꺼둡니다.
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}