upstream backend_alb {
    # 🎯 [중요] 아까 만드신 '백엔드용 AWS ALB의 도메인 주소'를 적어줍니다!
    # 🚨 여기에 백엔드 EC2 컴퓨터의 '프라이빗 IPv4 주소'와 노드 포트를 적>어줍니다!
    server 10.0.128.10:3002;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name olive0.store www.olive0.store;

    # 내 Vite React 빌드 파일들이 담긴 창고 위치
    root /usr/share/nginx/html;
    index index.html;

    # 1. API 요청 ➔ 백엔드 EC2로 직통 다이렉트 패스
    location /api/ {
        proxy_pass http://backend_alb;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. 일반 접속 ➔ 내 React 앱 화면 띄워주기 (★절대 사수!)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. Nginx 생존 신고 통로 (★미래의 ALB를 위해 사수!)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}