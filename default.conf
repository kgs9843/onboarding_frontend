upstream backend_service_connect {
    # 🎯 [완공] 백엔드 서비스 커넥트의 내부 도메인 주소와 앱 포트를 지정합니다!
    server backend:3002;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name olive0.store www.olive0.store;

    # 내 Vite React 빌드 파일들이 담긴 창고 위치
    root /usr/share/nginx/html;
    index index.html;

    # 1. API 요청 ➔ 서비스 커넥트 고속도로 타고 백엔드로 직통 패스
    location /api/ {
        proxy_pass http://backend_service_connect;
        proxy_http_version 1.1;
        
        # 서비스 커넥트 통신을 원활하게 뚫어주기 위한 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 대용량 데이터나 긴 연산을 위한 타임아웃 버퍼 확보
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 2. 일반 접속 ➔ 내 React 앱 화면 띄워주기
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. Nginx 생존 신고 통로 (ALB 헬스체크용)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}