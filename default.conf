log_format detailed
    '$time_iso8601 | $status | $request_time s | '
    '$request | '
    'client=$remote_addr | '
    'upstream=$upstream_addr | '
    'upstream_status=$upstream_status | '
    'upstream_time=$upstream_response_time s';

# ✅ upstream 방식으로 복귀 (Envoy가 인터셉트하므로 resolver 불필요)
upstream backend_service_connect {
    server backend:3002;
}

server {
    listen 80;
    server_name olive0.store www.olive0.store;

    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout detailed;
    error_log  /dev/stderr info;

    location /api/ {
        access_log /dev/stdout detailed;

        proxy_pass http://backend_service_connect;

        proxy_http_version 1.1;
        proxy_set_header Host               backend;
        proxy_set_header Connection         "";
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # 🌟 [100% 확실한 정석 문법] 
        # ALB가 준 오리지널 X-Ray 헤더 명칭 그대로를 WAS(backend)로 토스하겠다는 뜻입니다.
        proxy_set_header X-Amzn-Trace-Id    $http_x_amzn_trace_id;
        
        # 💡 만약 위 변수가 가끔 Nginx 버전에 따라 인식이 안 될 때를 대비한 '끝판왕 안전장치'
        # proxy_pass 밑에 이 설정을 두면 Nginx가 헤더를 가공하지 않고 원본 그대로 통과시킵니다.
        proxy_pass_header X-Amzn-Trace-Id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}