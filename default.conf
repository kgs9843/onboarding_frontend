upstream backend_service_connect {
    # 🟢 정석대로 도메인 네임을 그대로 유지하여 가변 IP에 대응합니다.
    server backend:3002;
    
    # 🛠️ 서비스 커넥트(Envoy)와의 펜딩 버그 방지를 위해 keepalive를 제거합니다.
}

server {
    listen 80;
    listen [::]:80;
    server_name olive0.store www.olive0.store;

    # 📝 [로그 활성화] Nginx 요청 처리 상태를 CloudWatch에서 실시간 감시합니다.
    access_log /dev/stdout;
    error_log /dev/stderr info;

    # 🛠️ [핵심 추가] AWS VPC 내부 DNS 서버를 지정하고, IPv6 조회를 강제로 끕니다!
    # AWS 환경의 내부 DNS 서버는 항상 VPC 서브넷 대역의 '.2' (10.0.0.2) 입니다.
    resolver 10.0.0.2 ipv6=off;

    # 내 Vite React 빌드 파일들이 담긴 창고 위치
    root /usr/share/nginx/html;
    index index.html;

    # 1. API 요청 ➔ 서비스 커넥트 고속도로 타고 백엔드로 직통 패스
    location /api/ {
        # 📝 백엔드로 토스되는 순간도 로그에 명시적으로 기록합니다.
        access_log /dev/stdout;

        proxy_pass http://backend_service_connect;
        
        # 🛠️ HTTP 버전을 기본값(1.0)으로 내려서 연결을 깔끔하게 끊고 맺도록 유도합니다.
        # (서비스 커넥트 프록시의 무한 펜딩 현상을 방지하는 가장 확실한 조치)
        # proxy_http_version 1.1; 

        # 서비스 커넥트 에이전트(Envoy)가 오해하지 않도록 Host 헤더만 명시합니다.
        proxy_set_header Host backend:3002;
        proxy_set_header Connection "";
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 대용량 데이터나 긴 연산을 위한 타임아웃 버퍼 확보
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 2. 일반 접속 ➔ 내 React 앱 화면 띄워주기
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. Nginx 생존 신고 통로 (ALB 헬스체크용)
    location = /health {
        # 헬스체크용 불필요한 로그는 쌓이지 않도록 끕니다.
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}