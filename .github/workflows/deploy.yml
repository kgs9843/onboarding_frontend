name: Deploy Frontend to AWS ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Push Frontend ARM Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 깃허브 가상 컴퓨터(x86)에서 가성비 좋은 AWS ARM64 이미지를 구울 수 있도록 QEMU를 켭니다.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. AWS 자격 증명 (OIDC 방식 - 보안 최강)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::058264340391:role/role-smileshark-dev-github-action
          aws-region: ap-northeast-2

      # 3. AWS ECR 로그인 토큰 받기
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. 순정 도커 명령어로 ARM64 이미지 빌드 후 ECR로 슛!
      - name: Build, Tag, and Push ARM64 Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # 🚨 [주의] AWS ECR에 프론트엔드용 리포지토리를 미리 만드시고 그 이름을 적어주세요!
          ECR_REPOSITORY: onboarding-frontend 
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ① 순정 도커 명령어로 가성비 원탑 ARM64 기반 프론트엔드 이미지 빌드
          docker build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # ② 고유 커밋 해시 태그(IMAGE_TAG)로 ECR 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # ③ 언제나 최신본을 가리키는 latest 태그로 ECR 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest