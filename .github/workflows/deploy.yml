name: Deploy Frontend to AWS ECS (ARM64)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, Push and Deploy Frontend ARM Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 깃허브 가상 컴퓨터(x86)에서 가성비 좋은 AWS ARM64 이미지를 구울 수 있도록 QEMU를 켭니다.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 🔥 [변경] 순정 docker build 대신 초고속 멀티 플랫폼 빌드를 가능하게 하는 Buildx 엔진을 켭니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. AWS 자격 증명 (OIDC 방식 - 보안 최강)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::730335303837:role/role-smileshark-dev-github-actions-deploy
          aws-region: ap-northeast-2

      # 3. AWS ECR 로그인 토큰 받기
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. 🔥 [변경] Buildx를 사용하여 초고속 ARM64 이미지 빌드와 동시에 ECR 창고로 슛!
      - name: Build and Push ARM64 Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: onboarding-frontend 
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # buildx를 쓰면 빌드와 동시에 ECR 푸시까지 (--push 옵션) 백엔드 단에서 실시간 스트리밍으로 한 방에 처리됩니다.
          # 아까 KMS 정책에 ecr.amazonaws.com을 추가했기 때문에 여기서 권한 에러 없이 깨끗하게 통과됩니다!
          docker buildx build \
            --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      # # 5. 🔥 [새로 추가] AWS ECS 서비스 강제 새 배포 (무중단 새로고침)
      # # 깃허브 액션이 퇴근하면서 ECS 지점장에게 위임장(Grant)을 넘기고 새로고침 버튼을 누르는 단계입니다.
      # - name: Deploy to Amazon ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster ecr-cluster-smileshark-dev \
      #       --service service-smileshark-dev-frontend \
      #       --force-new-deployment